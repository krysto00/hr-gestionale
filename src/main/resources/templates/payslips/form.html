<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Nuova Busta Paga</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="app-shell">
<main class="page-container">
<h1>Nuova Busta Paga</h1>
<nav class="main-nav">
    <a th:href="@{/payslips}">Torna all'elenco</a> |
    <a th:href="@{/dashboard}">Dashboard</a> |
    <a th:href="@{/logout}">Logout</a>
</nav>
<form class="form-card" th:action="@{/payslips/save}" th:object="${payslip}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <div>
        <label>Dipendente</label>
        <select name="employeeId" required>
            <option th:value="" th:text="'-- Seleziona dipendente --'"></option>
            <option th:each="employee : ${employees}"
                    th:value="${employee.id}"
                    th:text="${employee.fullName} + ' (' + ${employee.role} + ')' "></option>
        </select>
    </div>
    <div>
        <label>Mese</label>
        <input th:field="*{periodMonth}" type="number" min="1" max="12" required />
    </div>
    <div>
        <label>Anno</label>
        <input th:field="*{periodYear}" type="number" min="2000" required />
    </div>
    <div>
        <label>Stipendio base</label>
        <input th:field="*{baseSalary}" type="number" step="0.01" required />
    </div>
    <div>
        <label>Bonus</label>
        <input th:field="*{bonus}" type="number" step="0.01" required />
    </div>
    <div>
        <label>Detrazioni</label>
        <input th:field="*{deductions}" type="number" step="0.01" required />
    </div>
    <div>
        <label>Data emissione</label>
        <input th:field="*{issuedDate}" type="date" required />
    </div>
    <div>
        <button type="submit">Salva</button>
    </div>
</form>
</main>
</body>
</html>
