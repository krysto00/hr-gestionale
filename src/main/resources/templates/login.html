<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Login - HR Gestionale</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="app-shell">
<main class="page-container">
<h1>Login HR Gestionale</h1>
<form th:action="@{/login}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <div>
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required />
    </div>
    <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />
    </div>
    <div>
        <button type="submit">Accedi</button>
    </div>
    <div th:if="${param.error}">
        <p>Credenziali non valide</p>
    </div>
    <div th:if="${param.logout}">
        <p>Hai eseguito il logout con successo.</p>
    </div>
</form>
<hr />
<h2>Login alternativo</h2>
<!-- VULNERABILITY: SQL Injection (CWE-89) -->
<form th:action="@{/login-legacy}" method="post">
    <div>
        <label for="username-legacy">Username</label>
        <input id="username-legacy" name="username" type="text" required />
    </div>
    <div>
        <label for="password-legacy">Password</label>
        <input id="password-legacy" name="password" type="password" required />
    </div>
    <div>
        <button type="submit">Login Legacy</button>
    </div>
</form>
</main>
</body>
</html>
