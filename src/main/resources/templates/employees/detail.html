<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Dettaglio Dipendente</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="app-shell">
<main class="page-container">
<h1>Dettaglio Dipendente</h1>
<nav class="main-nav">
    <a th:href="@{/employees}">Torna all'elenco</a> |
    <a th:href="@{/dashboard}">Dashboard</a> |
    <a th:href="@{/logout}">Logout</a>
</nav>
<div>
    <p>Nome: <span th:text="${employee.fullName}"></span></p>
    <p>Email: <span th:text="${employee.email}"></span></p>
    <p>Username: <span th:text="${employee.username}"></span></p>
    <p>Ruolo: <span th:text="${employee.role}"></span></p>
    <p>Posizione: <span th:utext="${employee.position}"></span></p> <!-- VULNERABILITY: XSS Stored (CWE-79) -->
    <p>Reparto: <span th:text="${employee.department != null ? employee.department.name : 'Non assegnato'}"></span></p>
    <p>Data di assunzione: <span th:text="${employee.hireDate}"></span></p>
</div>
</main>
</body>
</html>
